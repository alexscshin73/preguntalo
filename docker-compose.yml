services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: preguntalo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-preguntalo}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-preguntalo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: preguntalo-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: preguntalo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data

  createbucket:
    image: minio/mc:latest
    container_name: preguntalo-minio-bootstrap
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin}; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/${S3_BUCKET:-manuals};
      /usr/bin/mc anonymous set private local/${S3_BUCKET:-manuals};
      exit 0;
      "

  api:
    build:
      context: ./apps/api
    container_name: preguntalo-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-preguntalo}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      createbucket:
        condition: service_completed_successfully
    ports:
      - "8010:8000"

  web:
    build:
      context: ./apps/web
    container_name: preguntalo-web
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8010
    depends_on:
      - api
    ports:
      - "3000:3000"
