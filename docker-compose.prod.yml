services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: preguntalo-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-preguntalo}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-preguntalo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: preguntalo-redis-prod
    restart: unless-stopped
    volumes:
      - ./redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: preguntalo-minio-prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - ./minio-data:/data

  createbucket:
    image: minio/mc:latest
    container_name: preguntalo-minio-bootstrap-prod
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin}; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/${S3_BUCKET:-manuals};
      /usr/bin/mc anonymous set private local/${S3_BUCKET:-manuals};
      exit 0;
      "

  api:
    build:
      context: ./apps/api
    container_name: preguntalo-api-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-preguntalo}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      LOCAL_AI_BASE_URL: ${LOCAL_AI_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      createbucket:
        condition: service_completed_successfully
    expose:
      - "8000"

  web:
    build:
      context: ./apps/web
    container_name: preguntalo-web-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://api:8000/api/v1
    depends_on:
      - api
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: preguntalo-caddy-prod
    restart: unless-stopped
    depends_on:
      - web
      - api
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
